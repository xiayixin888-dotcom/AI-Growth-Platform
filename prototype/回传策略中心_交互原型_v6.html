<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>回传策略中心 - MVP V6 交互原型</title>
  <style>

    .main{padding:22px 28px 28px;overflow:auto}.top{height:52px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.title-row{display:flex;align-items:center;gap:8px}.title h1{font-size:24px;margin:0}.info-icon{width:18px;height:18px;border:1px solid #cbd5e1;border-radius:50%;display:inline-grid;place-items:center;color:#64748b;background:#fff;font-size:12px;font-weight:800;cursor:help}.avatar{display:flex;align-items:center;gap:8px;color:#667085}.avatar span{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#c4b5fd);display:grid;place-items:center;color:#3730a3;font-weight:800}
    .view{display:none}.view.active{display:block}.card{background:rgba(255,255,255,.88);border:1px solid rgba(226,232,240,.78);border-radius:var(--r);box-shadow:var(--shadow)}.panel{padding:18px}.panel h2,.panel h3{margin:0 0 14px}.sub{font-size:12px;color:var(--muted)}.toolbar,.filters,.row-actions,.tabs,.chips{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.toolbar.between{justify-content:space-between}

    .detail-page-head{min-height:52px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}.detail-head-left{min-width:0}.detail-title-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.detail-head-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}.strategy-top{display:grid;grid-template-columns:minmax(0,1fr);gap:16px;align-items:center}.strategy-meta{display:flex;gap:8px;flex-wrap:wrap;color:#64748b}.editor-layout{display:grid;grid-template-columns:minmax(380px,420px) minmax(0,1fr);gap:16px;align-items:start}.structure-panel{display:grid;gap:14px;min-width:0}.structure-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.structure-title h3{margin:0}.structure-title .btn{align-self:center}.stage-rail{display:grid;gap:10px}.stage-tile{position:relative;width:100%;min-width:0;border:1px solid #dfe7fb;border-radius:16px;background:#fff;padding:12px 42px 12px 12px;text-align:left}.stage-tile.active,.branch-row.active{border-color:#7b5cff;box-shadow:0 0 0 3px rgba(123,92,255,.12)}.stage-tile h4{margin:0 0 8px}.stage-delete{position:absolute;right:10px;top:10px}.branch-row{width:100%;min-width:0;border:1px solid #dfe7fb;border-radius:16px;background:#fff;padding:12px;text-align:left;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}.branch-main{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:start;cursor:pointer}.branch-detail{min-width:0}.branch-row .chips{justify-content:flex-start}.rank{width:34px;height:34px;border-radius:12px;background:#eef2ff;color:#4f46e5;display:grid;place-items:center;font-weight:800}

    .condition-builder{border:1px solid #edf1f7;border-radius:14px;background:#fcfdff;padding:8px;overflow:hidden}.condition-row{display:grid;grid-template-columns:28px 118px minmax(300px,1fr) minmax(188px,.55fr) 58px minmax(72px,.35fr);gap:6px;margin-bottom:8px;align-items:center}.condition-row>*{min-width:0}.condition-row .select,.condition-row .input{height:34px;padding:0 8px;text-overflow:clip}.condition-row.time-row{grid-template-columns:28px 108px minmax(460px,1fr)}.condition-row.no-extra{grid-template-columns:28px 110px minmax(320px,1fr) 86px minmax(160px,.7fr)}.metric-window{display:grid;grid-template-columns:minmax(92px,1fr) auto;gap:6px;align-items:center}.metric-hours{gap:4px}.metric-hours .input{width:52px;flex:none}.row-delete{width:26px;height:26px;border:1px solid #e2e8f0;border-radius:9px;background:#fff;color:#94a3b8;display:grid;place-items:center;font-size:15px;line-height:1}.row-delete:hover{border-color:#fecaca;background:#fffafa;color:var(--red)}.time-range{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:6px}.logic-toggle{display:inline-flex;align-items:center;height:24px;border:1px solid #dbe3f0;border-radius:999px;background:#f8fafc;overflow:hidden;margin:6px 0 8px 34px}.logic-toggle button{height:22px;border:0;background:transparent;color:#64748b;padding:0 9px}.logic-toggle button.active{background:#eef2ff;color:#4f46e5;font-weight:700}.with-unit{display:flex;align-items:center;gap:8px;white-space:nowrap}.with-unit .input{flex:1;min-width:0}.branch-actions{display:flex;gap:4px;justify-content:flex-end}.icon-btn{width:28px;height:28px;border:1px solid #dfe7fb;border-radius:10px;background:#fff;color:#4f46e5;display:grid;place-items:center;font-size:14px;line-height:1}.icon-btn.danger{color:var(--red)}.icon-btn:disabled{color:#cbd5e1;background:#f8fafc}.icon-btn:hover:not(:disabled){border-color:#a99cff;background:#f6f4ff}.filter-grid{display:grid;gap:10px}.multi-dropdown{position:relative}.multi-trigger{width:100%;height:36px;border:1px solid var(--line);border-radius:12px;background:#fff;color:#172033;padding:0 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left}.multi-trigger span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.multi-menu{display:none;position:absolute;left:0;right:0;top:40px;z-index:12;max-height:220px;overflow:auto;border:1px solid #dfe7fb;border-radius:12px;background:#fff;box-shadow:0 14px 35px rgba(53,79,146,.16);padding:6px}.multi-dropdown.open .multi-menu{display:grid;gap:2px}.multi-option{min-height:30px;border-radius:8px;display:flex;align-items:center;gap:8px;padding:4px 8px;color:#334155}.multi-option:hover{background:#f5f7ff}.multi-option input{width:14px;height:14px}.deduct-summary{border:1px solid #dfe7fb;border-radius:14px;background:linear-gradient(135deg,#fff,#f7f9ff);padding:12px}.deduct-inline{gap:8px;flex-wrap:wrap}.deduct-time{display:flex;align-items:center;gap:8px;margin-left:auto}.preview-box{background:#fbfdff;border:1px dashed #cbd5e1;border-radius:14px;padding:12px;color:#42526a;line-height:1.8}.inline-checks{display:flex;align-items:center;gap:14px;flex-wrap:wrap}.inline-checks label{display:flex;align-items:center;gap:6px}.error-strip{border:1px solid #fed7aa;background:#fff7ed;color:#9a3412;border-radius:14px;padding:12px;margin-bottom:12px}.error-strip button{border:0;background:transparent;color:#9a3412;text-decoration:underline;cursor:pointer}.timeline{display:grid;gap:10px}.time-node{border:1px solid #dfe7fb;background:#fff;border-radius:14px;padding:12px}.time-node b{display:block;margin-bottom:4px}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}.toast{position:fixed;right:24px;bottom:24px;z-index:50;background:#101828;color:#fff;border-radius:14px;padding:12px 15px;box-shadow:var(--shadow);transform:translateY(18px);opacity:0;transition:.18s}.toast.show{opacity:1;transform:none}

<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">V6</div><span>AI Growth</span></div>
    <div><div class="nav-label">回传策略中心</div><nav class="nav" id="nav"></nav></div>
    <div class="sub" style="margin-top:auto">MVP V6：阶段与转化事件合并为一层</div>
  </aside>
  <main class="main">
    <div class="top" id="globalTop">
      <div class="title"><div class="title-row"><h1 id="pageTitle">策略管理</h1><span class="info-icon" id="pageInfo" title="按策略组管理主线阶段与分支策略。">i</span></div></div>
      <div class="avatar"><span>A</span>Admin</div>
    </div>

    <section id="strategies" class="view active">
      <div class="card panel">
        <div class="toolbar between">
          <div class="filters" id="strategyFilters"></div>
          <button class="btn primary" onclick="openStrategy()">新建策略组</button>
        </div>
      </div>
      <div class="card table" id="strategyBox" style="margin-top:18px"></div>
    </section>

    <section id="templates" class="view">
      <div class="card panel">
        <div class="filters" id="templateFilters"></div>
      </div>
      <div class="card table" id="templateBox" style="margin-top:18px"></div>
    </section>

    <section id="runtime" class="view">
      <div class="card panel" style="margin-bottom:18px">
        <div class="filters" id="runtimeFilters"></div>
      </div>
      <div class="card table" id="runtimeBox"></div>
    </section>

    <section id="logs" class="view">
      <div class="card panel">
        <div class="filters" id="logFilters"></div>
      </div>
      <div class="card table" id="logBox" style="margin-top:18px"></div>
    </section>

    <section id="config" class="view">
      <div class="toolbar between" style="justify-content:flex-end;margin-bottom:12px">
        <button class="btn primary" onclick="toast('常用转化类型已保存')">保存常用项</button>
      </div>
      <div id="configContent"></div>
    </section>

    <section id="strategyDetail" class="view detail-workspace">
      <div class="detail-page-head">
        <div class="detail-head-left">
          <div class="detail-title-row">
            <h1 style="margin:0;font-size:24px">策略组详情</h1>
            <div class="strategy-meta" id="detailMeta"></div>
          </div>
          <p class="sub" style="margin:4px 0 0">左侧为主线阶段和分支策略结构，右侧为当前选中项的完整表单。</p>
        </div>
        <div class="detail-head-right">
          <div class="row-actions" id="detailActions"></div>
        </div>
      </div>
      <div id="errorArea"></div>
      <div class="card panel" style="margin-bottom:14px">
        <div class="strategy-top">
          <div id="strategyBasicForm"></div>
        </div>
      </div>
      <div class="editor-layout">
        <div class="structure-panel">
          <div class="card panel">
            <div class="structure-title"><h3>主线阶段</h3><button class="btn primary" onclick="addStage()">新增阶段</button></div>
            <p class="sub">每个阶段直接对应一个转化事件，点击阶段卡片编辑完整表单。</p>
            <div class="stage-rail" id="stageRail"></div>
          </div>
          <div class="card panel">
            <div class="structure-title"><h3>分支策略</h3><button class="btn primary" onclick="addBranch()">新增分支</button></div>
            <p class="sub">同一对象可命中多个分支；同一业务转化事件仅执行最高优先级。</p>
            <div id="branchList" style="display:grid;gap:10px"></div>
          </div>
        </div>
        <div class="card panel detail-card">
          <div id="editorForm"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="drawer-mask" id="drawerMask" onclick="closeAllDrawers()"></div>
<aside class="drawer" id="objectDrawer">
  <div class="drawer-head"><h2 id="objectTitle">对象详情</h2><button class="btn" onclick="closeObject()">关闭</button></div>
  <div class="drawer-body"><div id="objectBody"></div></div>
</aside>

<div class="modal-mask" id="modalMask" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-head"><h2 id="modalTitle"></h2><button class="btn" onclick="closeModal()">关闭</button></div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-foot" id="modalFoot"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const navs=[
  ['strategies','策略管理','按策略组管理主线阶段与分支策略。','策'],
  ['templates','模板库','复用已验证策略配置，一键复制为新策略组。','模'],
  ['runtime','运行详情','查看对象当前阶段、阶段进度和命中分支。','运'],
  ['logs','回传记录','查看单次事件命中版本、配置来源和未回传原因。','记'],
  ['config','平台转化类型','维护各平台转化类型，并勾选运营常用项作为策略配置枚举。','配']
];
const events=['点击或长按落地页组件','加企微好友','加企微群','有效开口','会话线索'];
const conversionTypes={
  '巨量':['button 按钮点击','add_friend 加企微好友','group_join 加企微群','consult_effective 有效咨询','clue_confirm 会话线索'],
  '百度':['3 表单提交成功','79 微信加粉成功','92 有效咨询','75 回访发现意向'],
  '腾讯':['CUSTOM 自定义行为','ADD_WECHAT 添加微信','JOIN_GROUP 加群','CONSULT 有效咨询','CONFIRM_EFFECTIVE_LEADS 确认有效线索']
};

function cloneStrategy(source,fromTemplate=false){

  next.name=`${fromTemplate?(source.templateName||source.name):source.name}_副本`;
  next.status='停用';
  next.version=1;
  next.updated='2026-07-03 现在';
  next.isTemplate=false;
  next.templateName='';
  next.copyCount=0;
  next.creator='Admin';
  if(fromTemplate){
    next.objectItems=[];

  strategies.unshift(next);

  toast(fromTemplate?'已从模板复制为停用策略组，可以去策略管理中选择生效对象':'已复制策略组');

function saveStrategy(){
  const s=strategy(), errors=[];
  if(!s.name.trim()) errors.push(['stage',0,'策略组名称不能为空']);
  if(!s.platform) errors.push(['stage',0,'平台不能为空']);
  if(!s.scope) errors.push(['stage',0,'生效对象类型不能为空']);
  if(!(s.objectItems||[]).length) errors.push(['stage',0,'生效对象至少选择一个']);
  if(!s.stages.length) errors.push(['stage',0,'至少存在一个主线阶段']);
  s.stages.forEach((st,i)=>{
    if(!st.event)errors.push(['stage',i,`${st.name} 未选择转化事件`]);
    if(!st.conversion)errors.push(['stage',i,`${st.name} 未选择平台转化类型`]);
    if(!st.conditionRows.length)errors.push(['stage',i,`${st.name} 至少需要 1 条流转条件`]);
    if(targetStageOptionsFor(i).length && !st.targetStage)errors.push(['stage',i,`${st.name} 流转条件未选择目标阶段`]);
    st.conditionRows.forEach((r,ri)=>{
      if(r.category==='事件数量达标' && (!Number(r.value)||Number(r.value)<1))errors.push(['stage',i,`${st.name} 第 ${ri+1} 条事件数量条件必须为正整数`]);
      if(r.category==='投放指标')errors.push(['stage',i,`${st.name} 流转条件不支持投放指标，请在分支触发条件中配置`]);
    });
    if((st.deduct.m||st.deduct.n) && (!st.deduct.m||!st.deduct.n||st.deduct.n>=st.deduct.m))errors.push(['stage',i,`${st.name} 的扣量需满足 1≤N<M`]);
  });
  s.branches.forEach((b,i)=>{
    if(!b.conditions.length)errors.push(['branch',i,`${b.name} 触发条件不能为空`]);
    if(!b.event)errors.push(['branch',i,`${b.name} 未选择分支转化事件`]);
    if(!b.conversion)errors.push(['branch',i,`${b.name} 未选择平台转化类型`]);
    b.conditions.forEach((r,ri)=>{
      if(r.category==='投放指标' && r.window==='近 N 小时' && (!Number(r.windowHours)||Number(r.windowHours)<1||Number(r.windowHours)>168))errors.push(['branch',i,`${b.name} 第 ${ri+1} 条投放指标近 N 小时必须配置 1-168 的小时数`]);
    });
    if(!b.exit.conditionGone && !b.exit.limit)errors.push(['branch',i,`${b.name} 至少选择 1 个退出条件`]);
    if(b.exit.limit && (!Number(b.exit.limitValue)||Number(b.exit.limitValue)<1))errors.push(['branch',i,`${b.name} 的分支回传上限必须为正整数`]);
    if(b.mode==='与主线并行' && b.ratioMode==='按比例回传' && (!b.ratioX||!b.ratioY))errors.push(['branch',i,`${b.name} 的分支回传比例必须配置`]);
    if(b.mode==='与主线并行' && b.ratioMode==='按比例回传' && !b.conditions.some(c=>c.category==='策略状态'&&c.field==='当前阶段'&&c.op==='='&&c.value))errors.push(['branch',i,`${b.name} 按比例回传时，触发条件必须选择主线阶段`]);
  });
  if(errors.length){$('errorArea').innerHTML=`<div class="error-strip"><b>保存校验未通过</b><div>${errors.map((e,idx)=>`<div>${idx+1}. <button onclick="selectNode('${e[0]}',${e[1]})">${e[2]}</button></div>`).join('')}</div></div>`;toast('请先处理保存校验错误');return}
  $('errorArea').innerHTML='';confirmSave();
}

  return logs.filter(l=>
    (!logFilters.strategyGroups.length||logFilters.strategyGroups.includes(l.strategyName)) &&
    (!logFilters.versions.length||logFilters.versions.includes(l.version)) &&
    (!logFilters.objectTypes.length||logFilters.objectTypes.includes(l.objectType)) &&
    (!logFilters.objects.length||logFilters.objects.includes(l.object)) &&
    (!logFilters.events.length||logFilters.events.includes(l.event)) &&
    (!logFilters.statuses.length||logFilters.statuses.includes(l.status)) &&
    (!logFilters.reasons.length||logFilters.reasons.includes(l.reason)) &&
    (!logFilters.appNames.length||logFilters.appNames.includes(l.appName))
  );
}
function logObjectOptions(){
  const source=logFilters.objectTypes.length?logs.filter(l=>logFilters.objectTypes.includes(l.objectType)):logs;
  return Array.from(new Set(source.map(l=>l.object)));
}
function updateLogFilter(key,value,checked){logFilters[key]=toggleValue(logFilters[key],value,checked);selectedLogIds=[];renderLogs()}
function updateLogStrategyFilter(value,checked){updateLogFilter('strategyGroups',value,checked)}
function updateLogVersionFilter(value,checked){updateLogFilter('versions',value,checked)}
function updateLogObjectTypeFilter(value,checked){logFilters.objectTypes=toggleValue(logFilters.objectTypes,value,checked);logFilters.objects=logFilters.objects.filter(o=>logObjectOptions().includes(o));selectedLogIds=[];renderLogs()}
function updateLogObjectFilter(value,checked){updateLogFilter('objects',value,checked)}
function updateLogEventFilter(value,checked){updateLogFilter('events',value,checked)}
function updateLogStatusFilter(value,checked){updateLogFilter('statuses',value,checked)}
function updateLogReasonFilter(value,checked){updateLogFilter('reasons',value,checked)}
function updateLogAppFilter(value,checked){updateLogFilter('appNames',value,checked)}
function clearLogFilters(){logFilters={strategyGroups:[],versions:[],objectTypes:[],objects:[],events:[],statuses:[],reasons:[],appNames:[]};selectedLogIds=[];renderLogs()}
function toggleLog(id,checked){selectedLogIds=toggleValue(selectedLogIds,id,checked);renderLogs()}
function toggleAllLogs(checked){selectedLogIds=checked?filteredLogs().map(l=>l.id):[];renderLogs()}
function manualReportSelected(){
  const count=selectedLogIds.length;
  if(!count)return;
  $('modalTitle').textContent='确认手动回传';
  $('modalBody').innerHTML=`<div class="preview-box">将对已勾选的 ${count} 条回传记录重新上报。原记录保留不覆盖，系统会新增手动回传记录，用于保留完整审计链路。</div>`;
  $('modalFoot').innerHTML='<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="confirmManualReport()">确认回传</button>';
  $('modalMask').classList.add('show');$('modal').classList.add('show');
}
function confirmManualReport(){
  const selected=logs.filter(l=>selectedLogIds.includes(l.id));
  selected.forEach((l,i)=>logs.unshift({...l,id:`manual-${Date.now()}-${i}`,time:'2026-07-06 现在',source:'手动回传',status:'成功',reason:'手动回传成功',originId:l.id}));
  const count=selected.length;selectedLogIds=[];closeModal();renderLogs();toast(`已新增 ${count} 条手动回传成功记录`);
}
function showLogDetail(id){
  const l=logs.find(item=>item.id===id)||logs[0];
  $('modalTitle').textContent='回传详情';$('modalBody').innerHTML=`<div class="split"><div><h3>命中配置</h3><div class="preview-box">策略组 ${l.strategy} ${l.version}；当前阶段：${l.stage}；业务事件：${l.event}；AppName：${l.appName}。</div></div><div><h3>判断结果</h3><div class="preview-box">回传控制、语料标签、用户属性、设备、AppName 筛选逐项展示；状态明细：${l.reason}。</div></div></div>`;$('modalFoot').innerHTML='<button class="btn primary" onclick="closeModal()">知道了</button>';$('modalMask').classList.add('show');$('modal').classList.add('show');
}
function closeModal(){$('modalMask').classList.remove('show');$('modal').classList.remove('show')}
function renderConfig(){
  const platforms=Object.keys(allConversionTypes), platform=configPlatformTab, types=allConversionTypes[platform];
  $('configContent').innerHTML=`<div class="config-platform">
    <div class="config-platform-head">
      <div class="platform-tabs">${platforms.map(p=>`<button class="platform-tab ${platform===p?'active':''}" onclick="configPlatformTab='${p}';renderConfig()">${p}</button>`).join('')}</div>
      <div class="row-actions">${tag(`已选 ${conversionTypes[platform].length} 项常用`,'blue')}<a class="btn small" href="${conversionTypeDocs[platform]}" target="_blank">来源文档</a></div>
    </div>
    <div class="type-grid">${types.map(type=>`<label class="type-check"><input type="checkbox" ${conversionTypes[platform].includes(type)?'checked':''}><span>${esc(type)}</span></label>`).join('')}</div>
  </div>`;
}
function sceneLabel(scene){
  return ({stageCondition:'阶段条件达标',corpus:'回传筛选-语料标签',userAttribute:'回传筛选-用户属性',branch:'分支触发条件'}[scene]||scene);
}
initNav();renderStrategies();
</script>
</body>
</html>
