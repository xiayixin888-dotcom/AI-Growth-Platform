<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>回传策略中心 - V1.0.1 原型</title>
  <style>
    :root{
      --bg:#f7f9ff;--card:#fff;--text:#172033;--muted:#738096;--line:#e7ebf4;
      --blue:#3768ff;--purple:#7b5cff;--cyan:#17b6d8;--green:#10b981;--orange:#f59e0b;--red:#ef4444;
      --shadow:0 18px 45px rgba(53,79,146,.10);--soft:0 1px 3px rgba(30,41,59,.06);--r:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at 8% 0,#ebe7ff 0,transparent 28%),radial-gradient(circle at 90% 8%,#e4f9ff 0,transparent 25%),var(--bg)}
    button,input,select,textarea{font:inherit}button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}
    .side{background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border-right:1px solid rgba(225,231,244,.72);padding:24px 18px;display:flex;flex-direction:column;gap:22px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:18px}.logo{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 12px 24px rgba(79,70,229,.22);display:grid;place-items:center;color:#fff}
    .nav-label{font-size:12px;color:#a0a9bb;margin:14px 10px 6px}.nav{display:grid;gap:6px}.nav button{border:0;background:transparent;border-radius:14px;height:42px;text-align:left;padding:0 14px;color:#556174;display:flex;align-items:center;gap:10px}.nav button:hover{background:#f2f5ff}.nav button.active{background:linear-gradient(90deg,#eef0ff,#f7fbff);color:#4f46e5;font-weight:700;box-shadow:inset 3px 0 0 #675cff}.dot{width:18px;height:18px;border-radius:7px;border:1.5px solid currentColor;display:grid;place-items:center;font-size:10px}.collapse{margin-top:auto;color:#8a95a8;font-size:13px}
    .main{padding:22px 28px 28px;overflow:auto}.top{height:52px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.title h1{font-size:24px;margin:0 0 4px}.title p{margin:0;color:var(--muted)}.icons{display:flex;align-items:center;gap:14px;color:#758299}.avatar{display:flex;align-items:center;gap:8px}.avatar span{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#c4b5fd);display:grid;place-items:center;color:#3730a3;font-weight:800}
    .view{display:none}.view.active{display:block}.card{background:rgba(255,255,255,.88);border:1px solid rgba(226,232,240,.78);border-radius:var(--r);box-shadow:var(--shadow)}.panel{padding:18px}.panel h2,.panel h3{margin:0 0 14px}.sub{font-size:12px;color:var(--muted)}.toolbar,.filters,.row-actions,.tabs,.chips{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.toolbar.between{justify-content:space-between}.filters{margin-bottom:14px}
    .cards{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr));gap:16px;margin-bottom:18px}.metric{padding:18px;display:flex;gap:14px;align-items:center}.micon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#eef2ff,#dbeafe);display:grid;place-items:center;color:#5b5cff;font-weight:800}.metric b{font-size:22px}.metric small{color:var(--green)}
    .grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px}.cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.config-grid{display:grid;grid-template-columns:320px 1fr;gap:18px}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.field label{display:block;color:#7b879a;font-size:12px;margin-bottom:5px}.input,.select,.textarea{width:100%;height:36px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:0 12px;color:#172033}.select.multi{height:86px;padding:8px 12px}.textarea{height:76px;padding:10px;resize:vertical}
    .btn{height:36px;border:1px solid var(--line);border-radius:12px;background:#fff;color:#42526a;padding:0 14px;display:inline-flex;align-items:center;gap:6px}.btn:hover{border-color:#bdc7da;background:#fbfcff}.btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:#fff;box-shadow:0 12px 22px rgba(79,70,229,.20)}.btn.danger{color:var(--red)}.btn[disabled]{opacity:.48;cursor:not-allowed}
    .table{overflow:auto}table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:13px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}th{color:#7b879a;font-size:12px;font-weight:700;background:#fbfcff}tr:hover td{background:#fbfcff}.name{font-weight:700}.tag{display:inline-flex;align-items:center;min-height:24px;border-radius:999px;padding:2px 9px;font-size:12px;border:1px solid transparent;white-space:nowrap}.tag.blue{background:#eef2ff;color:#4f46e5;border-color:#d8defe}.tag.green{background:#ecfdf5;color:#059669;border-color:#b7ead7}.tag.orange{background:#fff7ed;color:#d97706;border-color:#fed7aa}.tag.red{background:#fef2f2;color:#dc2626;border-color:#fecaca}.tag.gray{background:#f1f5f9;color:#64748b;border-color:#e2e8f0}.switch{width:38px;height:22px;border:0;border-radius:999px;background:#cbd5e1;padding:3px}.switch:before{content:"";display:block;width:16px;height:16px;background:#fff;border-radius:50%;transition:.18s}.switch.on{background:linear-gradient(135deg,var(--blue),var(--purple))}.switch.on:before{transform:translateX(16px)}
    .list{display:grid;gap:10px}.itemline{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:12px}.empty,.state{padding:42px;text-align:center;color:var(--muted)}.state b{display:block;color:#334155;margin-bottom:6px}.skeleton{height:260px;border-radius:18px;background:linear-gradient(90deg,#eef2f7,#fff,#eef2f7);background-size:200% 100%;animation:load 1.1s infinite}@keyframes load{to{background-position:-200% 0}}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.summary-card{border:1px solid #dfe7fb;background:linear-gradient(135deg,#fff,#f7f9ff);border-radius:16px;padding:12px}.summary-card b{display:block;margin-bottom:8px}.summary-line{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px;color:#64748b;font-size:12px}.event-pills{display:flex;gap:6px;flex-wrap:wrap}
    .stage{border:1px solid var(--line);border-radius:18px;background:#fff;margin-top:14px;overflow:hidden}.stage-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 16px;background:linear-gradient(90deg,#fbfcff,#f4f7ff);border-bottom:1px solid var(--line)}.stage-body{padding:14px}.stage-settings{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.setting-card{border:1px solid var(--line);border-radius:14px;background:#fbfcff;padding:12px}.event-card{border:1px solid #dde4f4;border-radius:16px;background:#fff;margin-bottom:12px;overflow:hidden}.event-head{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#fbfcff;border-bottom:1px solid var(--line);padding:10px 12px}.event-body{padding:12px}.control-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.advanced{margin-top:12px;padding:12px;border:1px dashed #cbd5e1;border-radius:14px;background:#fbfdff}.notice{margin:10px 0;padding:10px 12px;border-radius:12px;background:#f4f7ff;border:1px solid #dbe4ff;color:#42526e;font-size:12px;line-height:1.7}.cond{display:grid;grid-template-columns:130px 1fr 90px 1fr 42px;gap:8px;margin-bottom:8px}.low-tier{margin-top:12px;padding:12px;border-radius:14px;background:#f7f9ff;border:1px solid #dfe7fb}.hint-link{border:0;background:transparent;color:#4f46e5;padding:0;text-decoration:underline;text-underline-offset:3px}
    .hide{display:none!important}.drawer-mask,.modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.32);display:none;z-index:20}.drawer-mask.show,.modal-mask.show{display:block}.drawer{position:fixed;right:0;top:0;width:min(1180px,94vw);height:100vh;background:#f8faff;z-index:30;transform:translateX(102%);transition:.2s;box-shadow:var(--shadow);display:grid;grid-template-rows:64px 1fr 66px}.drawer.show{transform:none}.drawer-head,.drawer-foot{background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px}.drawer-foot{border-top:1px solid var(--line);border-bottom:0;justify-content:flex-end;gap:10px}.drawer-body{overflow:auto;padding:18px}
    .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(820px,92vw);max-height:86vh;background:#fff;z-index:31;border-radius:20px;box-shadow:var(--shadow);display:none;grid-template-rows:58px 1fr 62px;overflow:hidden}.modal.show{display:grid}.modal-head,.modal-foot{padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.modal-foot{border-top:1px solid var(--line);border-bottom:0;justify-content:flex-end;gap:10px}.modal-body{padding:18px;overflow:auto}.toast{position:fixed;right:24px;bottom:24px;z-index:50;background:#101828;color:#fff;border-radius:14px;padding:12px 15px;box-shadow:var(--shadow);transform:translateY(18px);opacity:0;transition:.18s}.toast.show{opacity:1;transform:none}
    @media(max-width:1100px){.app{grid-template-columns:1fr}.cards,.grid,.config-grid,.form,.cols2,.control-grid{grid-template-columns:1fr}.main{padding:18px}.cond{grid-template-columns:1fr}.side{display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">◆</div><span>AI Growth</span></div>
    <div><div class="nav-label">回传策略中心</div><nav class="nav" id="nav"></nav></div>
    <div class="collapse">‹ 收起菜单</div>
  </aside>
  <main class="main">
    <div class="top">
      <div class="title"><h1 id="pageTitle">策略管理</h1><p id="pageSub">按策略组配置阶段、转化事件、回传控制和低阶回传控制。</p></div>
      <div class="icons"><span>💬</span><span>🔔</span><span>?</span><div class="avatar"><span>A</span>Admin</div></div>
    </div>

    <section id="strategies" class="view active">
      <div class="card panel">
        <div class="toolbar between">
          <div class="filters">
            <input class="input" id="qStrategy" placeholder="策略组/账户/广告/落地页 ID 或名称" style="width:260px">
            <input class="input" id="fStrategyId" placeholder="策略组ID" style="width:120px">
            <input class="input" id="fAccountId" placeholder="账户ID" style="width:130px">
            <input class="input" id="fAdId" placeholder="广告ID/计划ID" style="width:150px">
            <input class="input" id="fLandingId" placeholder="落地页ID" style="width:130px">
            <input class="input" id="fAppName" placeholder="AppName" style="width:130px">
            <select class="select" id="fPlatform" style="width:120px"><option>全部平台</option><option>巨量</option><option>百度</option><option>腾讯</option></select>
            <select class="select" id="fStatus" style="width:120px"><option>全部状态</option><option>启用</option><option>停用</option></select>
            <select class="select" id="fScope" style="width:130px"><option>全部对象</option><option>广告</option><option>账户</option><option>落地页</option></select>
          </div>
          <button class="btn primary" onclick="openStrategy()">新建策略组</button>
        </div>
        <p class="sub">列表只展示策略组，不展示单对象策略配置；单对象调整从运行详情进入。</p>
      </div>
      <div class="card table" id="strategyBox" style="margin-top:18px"></div>
    </section>

    <section id="runtime" class="view">
      <div class="card panel">
        <div class="toolbar between">
          <div><h2>运行详情</h2><p class="sub">页面主体只展示对象列表；阶段流转记录和回传记录放在对象详情抽屉中。</p></div>
          <div class="toolbar"><button class="btn" onclick="switchView('strategies')">返回策略管理</button><button class="btn" onclick="renderRuntime()">刷新</button></div>
        </div>
      </div>
      <div class="card table" id="runtimeBox" style="margin-top:18px"></div>
    </section>

    <section id="logs" class="view">
      <div class="card panel">
        <div class="toolbar between">
          <div class="filters">
            <select class="select" id="logPlatform" style="width:120px"><option>全部媒体</option><option>巨量</option><option>百度</option><option>腾讯</option></select>
            <select class="select" id="logStatus" style="width:120px"><option>全部状态</option><option>待上报</option><option>成功</option><option>失败</option><option>已失效</option></select>
            <select class="select" id="logReason" style="width:140px"><option>全部状态明细</option><option>扣量</option><option>数量上限</option><option>媒体返回参数校验失败</option><option>未命中策略组</option><option>已解除好友关系</option></select>
            <select class="select" id="logEvent" style="width:140px"></select>
            <input class="input" id="logStrategy" placeholder="策略组ID/名称" style="width:150px">
            <input class="input" id="logAccountId" placeholder="账户ID" style="width:130px">
            <input class="input" id="logAdId" placeholder="广告ID/计划ID" style="width:150px">
            <input class="input" id="logLandingId" placeholder="落地页ID" style="width:130px">
            <input class="input" id="logAppName" placeholder="AppName" style="width:130px">
            <input class="input" id="logDate" placeholder="操作日期 YYYY-MM-DD" style="width:170px">
          </div>
          <p class="sub">回传记录只解释某次事件是否回传。</p>
        </div>
      </div>
      <div class="card table" id="logBox" style="margin-top:18px"></div>
    </section>

    <section id="replenish" class="view">
      <div class="card panel">
        <div class="toolbar between">
          <div>
            <h2>补量管理</h2>
            <p class="sub">按对象、日期、转化事件核算库存，成功后计入对应阶段进度。<button class="hint-link" onclick="showReplenishRules()">查看规则说明</button></p>
          </div>
          <div class="toolbar"><button class="btn" onclick="calcStock()">库存核算</button><button class="btn primary" onclick="openReplenish()">创建补量</button></div>
        </div>
      </div>
      <div class="card table" id="replenishBox" style="margin-top:18px"></div>
    </section>

    <section id="config" class="view">
      <div class="card panel">
        <div class="toolbar between">
          <div>
            <h2>回传配置</h2>
            <p class="sub">按配置类型分 Tab 展示，避免业务事件、平台枚举和条件字段混在一起。</p>
          </div>
          <div class="tabs" id="configTabs"></div>
        </div>
      </div>
      <div id="configContent" style="margin-top:18px"></div>
    </section>
  </main>
</div>

<div class="drawer-mask" id="drawerMask" onclick="closeDrawer()"></div>
<aside class="drawer" id="strategyDrawer">
  <div class="drawer-head"><h2 id="drawerTitle">新建策略组</h2><button class="btn" onclick="closeDrawer()">关闭</button></div>
  <div class="drawer-body">
    <div class="card panel">
      <div class="form">
        <div class="field"><label>策略组名称</label><input class="input" id="sName" placeholder="如：巨量冷启到加粉策略"></div>
        <div class="field"><label>平台</label><select class="select" id="sPlatform" onchange="renderStageEditor()"><option>巨量</option><option>百度</option><option>腾讯</option></select></div>
        <div class="field"><label>生效对象类型</label><select class="select" id="sScope"><option>广告</option><option>账户</option><option>落地页</option></select></div>
        <div class="field"><label>每日重置时间</label><select class="select" id="sResetTime"></select></div>
        <div class="field" style="grid-column:span 2"><label>生效对象</label><select class="select multi" id="sObjects" multiple></select></div>
        <div class="field" style="grid-column:span 2"><label>备注</label><input class="input" id="sRemark" placeholder="非必填，最多 200 字"></div>
      </div>
    </div>
    <div class="toolbar between" style="margin:16px 0 8px">
      <h2 style="margin:0;font-size:17px">阶段配置</h2>
      <button class="btn primary" onclick="addStage()">添加下一阶段</button>
    </div>
    <div id="stageEditor"></div>
  </div>
  <div class="drawer-foot"><button class="btn" onclick="closeDrawer()">取消</button><button class="btn primary" onclick="saveStrategy()">保存为停用策略组</button></div>
</aside>

<aside class="drawer" id="detailDrawer">
  <div class="drawer-head"><h2 id="detailTitle">对象详情</h2><button class="btn" onclick="closeDetail()">关闭</button></div>
  <div class="drawer-body">
    <div class="tabs" id="detailTabs"></div>
    <div id="detailBody"></div>
  </div>
  <div class="drawer-foot"><button class="btn" onclick="closeDetail()">关闭</button><button class="btn primary" onclick="openSingleObjectConfig(currentObjectId)">单对象策略配置</button></div>
</aside>

<div class="modal-mask" id="modalMask" onclick="closeModal()"></div>
<div class="modal" id="modal"><div class="modal-head"><h2 id="modalTitle"></h2><button class="btn" onclick="closeModal()">关闭</button></div><div class="modal-body" id="modalBody"></div><div class="modal-foot" id="modalFoot"><button class="btn primary" onclick="closeModal()">知道了</button></div></div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const navs=[
  ['strategies','策略管理','按策略组配置阶段、转化事件、回传控制和低阶回传控制。','策'],
  ['runtime','运行详情','查看每个广告、账户或落地页的当前阶段和配置来源。','运'],
  ['logs','回传记录','查看单次事件是否回传、失败原因和二次上报。','记'],
  ['replenish','补量管理','按对象、日期、转化事件核算库存并创建补量任务。','补'],
  ['config','回传配置','管理业务事件、平台常用转化类型和条件库。','配']
];
const businessEvents={support:['落地页互动','加企微好友','加企微群','有效开口','会话线索'],unsupported:['三要素齐全','留资','转私微','带看','成交']};
const metricLib=['广告消耗','广告点击量','广告转化成本','曝光量','点击率','落地页互动数','加企微数','有效开口数','会话线索数'];
const userLib=['新客 / 老客','是否首次添加','是否已流失后重新添加','加好友后未解除关系时长','是否无购房意向','意向区域','意向预算','意向户型','是否首次有效开口'];
const sourceLib=['AppName','渠道来源','设备系统','落地页 ID','广告计划 ID'];
const appOptions=['aweme','aweme_lite','news_article','news_article_lite','novelapp','novel_fm','douyin_select','douyincommerce','parallel','super'];
const objectOptions={
  '广告':['618 大促-信息流推广-A计划','618 大促-信息流推广-B计划','华东加粉计划-0308','腾讯落地页互动计划'],
  '账户':['巨量-华东账户','百度营销-华东账户','腾讯广告-深圳账户'],
  '落地页':['深圳二手房落地页A','杭州新房落地页B','全国找房线索页']
};
const conversions={
  '巨量':[['button','按钮点击','落地页互动'],['form','表单提交','线索'],['add_friend','加好友','加企微'],['group_chat','进群','企微群'],['consult_effective','有效咨询','有效开口'],['customer_effective','有效线索','线索质量'],['clue_confirm','线索确认','会话线索'],['phone','电话拨打','电话']],
  '百度':[['3','表单提交成功','表单'],['18','留线索','线索'],['35','微信复制按钮点击','微信'],['79','微信加粉成功','加粉'],['92','有效咨询','有效开口'],['75','回访-发现意向','意向线索'],['76','回访-高潜成交','高潜']],
  '腾讯':[['CUSTOM','自定义行为','自定义'],['CONSULT','咨询','有效开口'],['ADD_WECHAT','添加微信','加微'],['ADD_CUSTOMER_PAGE_INTERACTIVE','加微页面互动','互动'],['CONFIRM_EFFECTIVE_LEADS','确认有效线索','会话线索'],['ONLINE_CONSULT','在线咨询','咨询'],['MAKE_PHONE_CALL','拨打电话','电话']]
};
let common={'巨量':['button','add_friend','group_chat','consult_effective','clue_confirm'],'百度':['3','18','79','92'],'腾讯':['CUSTOM','CONSULT','ADD_WECHAT','CONFIRM_EFFECTIVE_LEADS']};
let currentPlatform='巨量', configTab='events', convSearchTerm='', editingId=null, currentObjectId=null, detailTab='progress';
let draftStages=[];
const defaultStages=()=>[

function eventHtml(ev,i,j,p){return`<div class="event-card"><div class="event-head"><div><b>转化事件 ${j+1}</b> <span class="tag ${ev.enabled?'green':'gray'}">${ev.enabled?'启用':'停用'}</span></div><div class="row-actions"><button class="switch ${ev.enabled?'on':''}" onclick="draftStages[${i}].events[${j}].enabled=!draftStages[${i}].events[${j}].enabled;renderStageEditor()"></button><button class="btn" onclick="draftStages[${i}].events[${j}].expanded=!draftStages[${i}].events[${j}].expanded;renderStageEditor()">${ev.expanded?'收起':'展开'}回传控制</button><button class="btn danger" ${draftStages[i].events.length===1?'disabled':''} onclick="deleteEvent(${i},${j})">删除</button></div></div><div class="event-body"><div class="control-grid"><div class="field"><label>业务事件</label><select class="select" onchange="draftStages[${i}].events[${j}].event=this.value;renderStageEditor()">${businessEvents.support.map(e=>`<option ${ev.event===e?'selected':''}>${e}</option>`).join('')}</select></div><div class="field"><label>平台转化类型</label><select class="select" onchange="draftStages[${i}].events[${j}].conv=this.value">${commonOptions(p,ev.conv)}</select></div><div class="field"><label>阶段流转目标</label><input class="input" type="number" min="1" value="${ev.target}" oninput="draftStages[${i}].events[${j}].target=this.value"></div><div class="field"><label>计数口径</label><input class="input" value="仅成功回传计入达标" disabled></div></div>${ev.expanded?controlHtml(ev,i,j):''}</div></div>`}
function controlHtml(ev,i,j){const windowLabel=ev.event==='会话线索'?'回传窗口天':'回传窗口分钟';return`<div class="advanced"><h3>回传控制</h3><div class="notice">阶段流转目标只决定对象何时进入下一阶段；当日累计、近 N 小时、每小时上限只做回传限流。被扣量、留存、窗口期、上限或高级条件拦截的事件，不计入阶段流转目标。</div><h3 style="margin-top:8px">扣量与留存</h3><div class="control-grid"><div class="field"><label>扣量：每 M 条</label><input class="input" type="number" value="${ev.deductM}" oninput="draftStages[${i}].events[${j}].deductM=this.value"></div><div class="field"><label>最后 N 条不回传</label><input class="input" type="number" value="${ev.deductN}" oninput="draftStages[${i}].events[${j}].deductN=this.value"></div><div class="field"><label>生效时段</label><input class="input" value="${ev.time}" oninput="draftStages[${i}].events[${j}].time=this.value"></div><div class="field"><label>排除访问应用</label><input class="input" value="${ev.apps}" oninput="draftStages[${i}].events[${j}].apps=this.value"></div><div class="field"><label>延时留存分钟</label><input class="input" type="number" value="${ev.delay}" oninput="draftStages[${i}].events[${j}].delay=this.value"></div><div class="field"><label>${windowLabel}</label><input class="input" type="number" value="${ev.window}" oninput="draftStages[${i}].events[${j}].window=this.value"></div></div><h3 style="margin-top:14px">限流与拦截</h3><div class="control-grid"><div class="field"><label>当日累计上限</label><input class="input" type="number" value="${ev.daily}" oninput="draftStages[${i}].events[${j}].daily=this.value"></div><div class="field"><label>近 N 小时</label><input class="input" type="number" value="${ev.rollingHours}" oninput="draftStages[${i}].events[${j}].rollingHours=this.value"></div><div class="field"><label>近 N 小时上限</label><input class="input" type="number" value="${ev.rollingLimit}" oninput="draftStages[${i}].events[${j}].rollingLimit=this.value"></div><div class="field"><label>每小时上限</label><input class="input" type="number" value="${ev.hourly}" oninput="draftStages[${i}].events[${j}].hourly=this.value"></div></div><h3 style="margin-top:14px">高级命中条件</h3>${ev.groups.map((g,gi)=>`<div class="itemline" style="display:block;margin-bottom:8px"><div class="toolbar between" style="margin-bottom:8px"><select class="select" style="width:130px" onchange="draftStages[${i}].events[${j}].groups[${gi}].logic=this.value"><option ${g.logic==='全部满足'?'selected':''}>全部满足</option><option ${g.logic==='任一满足'?'selected':''}>任一满足</option></select><div><button class="btn" onclick="addCondition(${i},${j},${gi})">加条件</button><button class="btn danger" onclick="deleteGroup(${i},${j},${gi})">删组</button></div></div>${g.conditions.map((c,ci)=>`<div class="cond"><select class="select" onchange="draftStages[${i}].events[${j}].groups[${gi}].conditions[${ci}].cat=this.value;draftStages[${i}].events[${j}].groups[${gi}].conditions[${ci}].field='';renderStageEditor()"><option ${c.cat==='投放指标'?'selected':''}>投放指标</option><option ${c.cat==='用户条件'?'selected':''}>用户条件</option><option ${c.cat==='来源 / 设备'?'selected':''}>来源 / 设备</option></select><select class="select" onchange="draftStages[${i}].events[${j}].groups[${gi}].conditions[${ci}].field=this.value">${fieldOptions(c.cat,c.field)}</select><input class="input" value="${c.op}" oninput="draftStages[${i}].events[${j}].groups[${gi}].conditions[${ci}].op=this.value"><input class="input" value="${c.value}" oninput="draftStages[${i}].events[${j}].groups[${gi}].conditions[${ci}].value=this.value"><button class="btn" onclick="deleteCondition(${i},${j},${gi},${ci})">×</button></div>`).join('')}</div>`).join('')}<button class="btn" onclick="addGroup(${i},${j})">新增条件组</button><p class="sub">条件组之间为“或”；同一条件组内按全部 / 任一判断。用户条件在这里配置。</p></div>`}
function lowTierHtml(st,i){let rows=Array.from({length:i},(_,idx)=>idx+1);return`<div class="low-tier"><h3>低阶回传控制</h3><p class="sub">进入 ${st.name} 后，低阶段事件是否继续回传。</p>${rows.map(n=>{let v=st.lowTier?.[n]||{mode:'停止低阶回传',x:1,y:0,z:0};let isFixed=v.mode==='每日固定补低阶回传';return`<div class="control-grid" style="margin-bottom:8px"><div class="field"><label>低阶阶段</label><input class="input" value="第 ${n} 阶段" disabled></div><div class="field"><label>控制方式</label><select class="select" onchange="setLowTier(${i},${n},'mode',this.value)">${['停止低阶回传','跟随低阶原配置','按当前阶段成功量补低阶回传','每日固定补低阶回传'].map(m=>`<option ${v.mode===m?'selected':''}>${m}</option>`).join('')}</select></div><div class="field"><label>${isFixed?'每日固定数量 Z':'当前阶段成功 X 条，补 Y 条'}</label><input class="input" value="${isFixed?v.z:`${v.x}:${v.y}`}" oninput="parseLowTier(${i},${n},this.value)"></div><div class="field"><label>说明</label><input class="input" value="${lowTierTip(v.mode)}" disabled></div></div>`}).join('')}</div>`}
function lowTierTip(m){return m==='按当前阶段成功量补低阶回传'?'当前阶段成功回传后触发':m==='每日固定补低阶回传'?'按业务日平滑分布':m==='跟随低阶原配置'?'继续处理真实低阶事件':'不再回传低阶事件'}
function commonOptions(p,val){let opts=(conversions[p]||[]).filter(x=>common[p]?.includes(x[0]));return opts.map(x=>`<option value="${x[0]}" ${val===x[0]?'selected':''}>${x[1]} (${x[0]})</option>`).join('')||'<option value="">请先在回传配置勾选常用项</option>'}
function fieldOptions(cat,val){const arr=cat==='用户条件'?userLib:cat==='来源 / 设备'?sourceLib:metricLib;return arr.map(f=>`<option ${val===f?'selected':''}>${f}</option>`).join('')}
function toggleReset(i){draftStages.forEach((s,idx)=>s.reset=idx===i?!s.reset:false);renderStageEditor();toast(draftStages[i].reset?`已开启${draftStages[i].name}每日重置，其他阶段自动关闭`:'已关闭每日重置')}
function addStage(){draftStages.push({name:`第 ${draftStages.length+1} 阶段`,flow:'全部达标后流转',reset:false,folded:false,events:[eventTpl('有效开口',commonOptions($('sPlatform').value,'').match(/value="([^"]*)"/)?.[1]||'',20)],lowTier:{}});renderStageEditor()}
function deleteStage(i){if(i!==draftStages.length-1||i===0)return;draftStages.pop();renderStageEditor();toast('已删除最后一个阶段')}
function addEvent(i){draftStages[i].events.push(eventTpl('有效开口','',10));renderStageEditor()}
function deleteEvent(i,j){if(draftStages[i].events.length===1)return;draftStages[i].events.splice(j,1);renderStageEditor()}
function addGroup(i,j){draftStages[i].events[j].groups.push({logic:'全部满足',conditions:[{cat:'用户条件',field:'是否首次添加',op:'=',value:'是'}]});renderStageEditor()}
function deleteGroup(i,j,gi){if(draftStages[i].events[j].groups.length===1)return;draftStages[i].events[j].groups.splice(gi,1);renderStageEditor()}
function addCondition(i,j,gi){draftStages[i].events[j].groups[gi].conditions.push({cat:'用户条件',field:'是否首次添加',op:'=',value:'是'});renderStageEditor()}
function deleteCondition(i,j,gi,ci){draftStages[i].events[j].groups[gi].conditions.splice(ci,1);renderStageEditor()}
function setLowTier(i,n,k,v){draftStages[i].lowTier ||= {}; draftStages[i].lowTier[n] ||= {mode:'停止低阶回传',x:1,y:0,z:0}; draftStages[i].lowTier[n][k]=v;renderStageEditor()}
function parseLowTier(i,n,val){draftStages[i].lowTier ||= {}; draftStages[i].lowTier[n] ||= {mode:'停止低阶回传',x:1,y:0,z:0}; if(val.includes(':')){let [x,y]=val.split(':');draftStages[i].lowTier[n].x=x;draftStages[i].lowTier[n].y=y}else draftStages[i].lowTier[n].z=val}
function saveStrategy(){
  if(!$('sName').value.trim()){toast('请填写策略组名称');return}
  if(draftStages.some(s=>!s.events.some(e=>e.enabled))){toast('每个阶段至少保留一个启用的转化事件');return}
  if(draftStages.flatMap(s=>s.events).some(e=>!e.conv)){toast('请选择平台转化类型；没有选项时先去回传配置勾选常用项');return}
  if(draftStages.some(s=>s.reset&&s.events.some(e=>Number(e.target)>Number(e.daily)))){toast('开启每日重置的阶段，阶段流转目标不能大于当日累计上限');return}
  const selectedObjects=Array.from($('sObjects').selectedOptions).map(o=>o.value);
  const base={name:$('sName').value,platform:$('sPlatform').value,scope:$('sScope').value,objects:selectedObjects.length?`${selectedObjects.length} 个${$('sScope').value}`:'待绑定对象',selectedObjects,stageCount:draftStages.length,events:[...new Set(draftStages.flatMap(s=>s.events.map(e=>e.event)))],reset:`${$('sResetTime').value} · ${draftStages.find(s=>s.reset)?.name||'未开启'}`,stages:JSON.parse(JSON.stringify(draftStages)),updated:'2026-07-01 现在'};
  if(editingId){let s=strategies.find(x=>x.id===editingId);Object.assign(s,base);s.version+=s.status==='启用'?1:0;toast(s.status==='启用'?'已生成新版本，新事件使用新版本':'已保存当前版本')}
  else strategies.unshift({...base,id:'RS-'+Math.floor(4000+Math.random()*5000),status:'停用',version:1,creator:'Admin'});
  closeDrawer();renderAll();
}
function copyStrategy(id){let s=JSON.parse(JSON.stringify(strategies.find(x=>x.id===id)));s.id='RS-'+Math.floor(5000+Math.random()*4000);s.name=s.name+' 副本';s.status='停用';s.objects='待绑定对象';s.version=1;s.updated='2026-07-01 现在';strategies.unshift(s);toast('已复制为停用策略组，不自动带入绑定对象');renderAll()}
function toggleStrategy(id){let s=strategies.find(x=>x.id===id);s.status=s.status==='启用'?'停用':'启用';toast(`${s.name} 已${s.status}`);renderAll()}
function deleteStrategy(id){let s=strategies.find(x=>x.id===id);if(s.status==='启用'){toast('启用中策略组不可删除');return}strategies=strategies.filter(x=>x.id!==id);toast('策略组已软删除，历史记录保留');renderAll()}
function renderRuntime(){$('runtimeBox').innerHTML=`<table><thead><tr><th>对象</th><th>当前阶段</th><th>阶段进度</th><th>最近回传</th><th>低阶回传状态</th><th>配置来源</th><th>更新时间</th><th>操作</th></tr></thead><tbody>${runtime.map(o=>`<tr><td><div class="name">${o.object}</div><div class="sub">${o.type} · ${o.platform}</div></td><td><span class="tag blue">${o.stage}</span></td><td>${o.progress}</td><td>${o.recent}</td><td>${o.low}</td><td><span class="tag ${o.source==='单对象策略配置'?'orange':'blue'}">${o.source}</span></td><td>${o.updated}</td><td><div class="row-actions"><button class="btn" onclick="openObjectDetail('${o.id}')">查看详情</button><button class="btn primary" onclick="openSingleObjectConfig('${o.id}')">单对象策略配置</button><button class="btn" onclick="openReplenish('${o.id}')">补量</button></div></td></tr>`).join('')}</tbody></table>`}
function openObjectDetail(id){currentObjectId=id;detailTab='progress';$('drawerMask').classList.add('show');$('detailDrawer').classList.add('show');renderObjectDetail()}
function closeDetail(){$('drawerMask').classList.remove('show');$('detailDrawer').classList.remove('show')}
function renderObjectDetail(){let o=runtime.find(x=>x.id===currentObjectId);$('detailTitle').textContent=o.object;const tabs=[['progress','阶段进度'],['flow','阶段流转记录'],['logs','最近回传记录'],['config','当前配置']];$('detailTabs').innerHTML=tabs.map(t=>`<button class="btn ${detailTab===t[0]?'primary':''}" onclick="detailTab='${t[0]}';renderObjectDetail()">${t[1]}</button>`).join('');
  if(detailTab==='progress')$('detailBody').innerHTML=`<div class="card panel"><h2>${o.stage}</h2><p>${o.progress}</p><p class="sub">未流转或未回传原因：${o.block}</p><div class="chips"><span class="tag blue">当前配置：${o.source}</span><span class="tag green">${o.low}</span></div></div>`;
  if(detailTab==='flow')$('detailBody').innerHTML=`<div class="table"><table><thead><tr><th>时间</th><th>类型</th><th>说明</th></tr></thead><tbody>${flowRecords.filter(r=>r.object===currentObjectId).map(r=>`<tr><td>${r.time}</td><td><span class="tag blue">${r.type}</span></td><td>${r.desc}</td></tr>`).join('')||'<tr><td colspan="3" class="empty">暂无流转记录</td></tr>'}</tbody></table></div>`;
  if(detailTab==='logs')$('detailBody').innerHTML=`<div class="table"><table><thead><tr><th>时间</th><th>事件</th><th>状态</th><th>原因</th></tr></thead><tbody>${logs.filter(l=>l.object===o.object).map(l=>`<tr><td>${l.time}</td><td>${l.event}</td><td>${l.status}</td><td>${l.reason}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">暂无回传记录</td></tr>'}</tbody></table></div>`;
  if(detailTab==='config')$('detailBody').innerHTML=`<div class="card panel"><h2>当前生效配置</h2><p>来源：${o.source}</p><p>当前阶段：${o.stage}</p><p>低阶回传控制：${o.low}</p><p class="sub">如需调整单个对象，点击底部“单对象策略配置”。</p></div>`;
}
function openSingleObjectConfig(id){let o=runtime.find(x=>x.id===id);openModal('单对象策略配置',`<div class="card panel"><p><b>来源策略组：</b>巨量冷启到有效开口策略</p><p><b>覆盖对象：</b>${o.object}</p><p><b>对象类型：</b>${o.type}</p><p><b>当前状态：</b><span class="tag gray">未启用</span> 新建后不会立即影响投放</p></div><div class="form" style="margin-top:12px"><div class="field"><label>对象当前阶段</label><select class="select"><option>${o.stage}</option><option>第 1 阶段</option><option>第 2 阶段</option><option>第 3 阶段</option></select></div><div class="field"><label>扣量</label><input class="input" value="每 3 条，最后 1 条不回传"></div><div class="field"><label>每小时上限</label><input class="input" value="20"></div><div class="field"><label>低阶回传控制</label><select class="select"><option>跟随聚合策略</option><option>按当前阶段成功量补低阶回传</option><option>每日固定补低阶回传</option><option>停止低阶回传</option></select></div></div><p class="sub">保存后状态仍为未启用，需要运营手动启用后才优先生效；账户类型对象启用后，仅影响该账户下后续命中的事件。</p>`, `<button class="btn" onclick="closeModal()">取消</button><button class="btn" onclick="toast('已保存为未启用配置');closeModal()">保存未启用</button><button class="btn primary" onclick="enableSingleObject('${id}')">保存并启用</button>`)}
function enableSingleObject(id){let o=runtime.find(x=>x.id===id);o.source='单对象策略配置';o.updated='2026-07-01 现在';flowRecords.unshift({object:id,time:'2026-07-01 现在',type:'人工调整',desc:'启用单对象策略配置，仅影响该对象后续事件'});toast('单对象策略配置已启用，仅影响该对象');closeModal();renderRuntime();if(currentObjectId)renderObjectDetail()}
function renderLogs(){const p=$('logPlatform')?.value||'全部媒体',st=$('logStatus')?.value||'全部状态',rs=$('logReason')?.value||'全部状态明细',ev=$('logEvent')?.value||'全部事件',q=$('logStrategy')?.value.trim()||'',aid=$('logAccountId')?.value.trim()||'',ad=$('logAdId')?.value.trim()||'',lp=$('logLandingId')?.value.trim()||'',app=$('logAppName')?.value.trim()||'',date=$('logDate')?.value.trim()||'';let rows=logs.filter(l=>(p==='全部媒体'||l.platform===p)&&(st==='全部状态'||l.status===st)&&(rs==='全部状态明细'||l.reason===rs)&&(ev==='全部事件'||l.event===ev)&&(!q||l.strategy.includes(q)||l.strategyId.includes(q))&&(!aid||l.accountId.includes(aid))&&(!ad||l.adId.includes(ad))&&(!lp||l.landingId.includes(lp))&&(!app||l.appName.includes(app))&&(!date||l.time.startsWith(date)));$('logBox').innerHTML=`<table><thead><tr><th>序号</th><th>日期</th><th>媒体类型</th><th>策略组ID</th><th>账户ID</th><th>广告ID / 计划ID</th><th>落地页ID</th><th>AppName</th><th>业务事件</th><th>平台转化类型</th><th>上传的参数</th><th>上报状态</th><th>状态明细</th><th>响应</th><th>操作</th></tr></thead><tbody>${rows.map((l,i)=>`<tr><td>${i+1}</td><td>${l.time}</td><td>${l.media}</td><td>${l.strategyId}</td><td>${l.accountId}</td><td>${l.adId}</td><td>${l.landingId}</td><td>${l.appName}</td><td>${l.event}</td><td>${l.conv}</td><td><span class="sub">${l.request}</span></td><td><span class="tag ${l.status==='成功'?'green':l.status==='失败'?'red':l.status==='待上报'?'blue':'orange'}">${l.status}</span></td><td>${l.reason}</td><td><span class="sub">${l.response||'-'}</span></td><td><button class="btn" onclick="openLogDetail('${l.time}')">详情</button>${['失败','已失效'].includes(l.status)?`<button class="btn primary" onclick="resubmitLog('${l.time}')">二次上报</button>`:''}</td></tr>`).join('')||'<tr><td colspan="15" class="empty">暂无符合筛选条件的回传记录</td></tr>'}</tbody></table>`}

function openLogDetail(time){let l=logs.find(x=>x.time===time);openModal('回传详情',`<div class="list"><div class="itemline"><span>原始事件</span><b>${l.event}</b></div><div class="itemline"><span>操作日期</span><b>${l.time}</b></div><div class="itemline"><span>媒体 / AppName</span><b>${l.media} / ${l.appName}</b></div><div class="itemline"><span>账户 / 广告 / 落地页</span><b>${l.accountId} / ${l.adId} / ${l.landingId}</b></div><div class="itemline"><span>策略组版本</span><b>${l.strategy}</b></div><div class="itemline"><span>命中阶段</span><b>${l.stage}</b></div><div class="itemline"><span>回传控制结果</span><b>${l.reason}</b></div><div class="itemline"><span>上传的完整参数</span><span class="sub">${l.request}</span></div><div class="itemline"><span>媒体完整响应结果</span><span class="sub">${l.response||'-'}</span></div></div>`)}
function renderTasks(){$('replenishBox').innerHTML=`<table><thead><tr><th>任务</th><th>平台</th><th>对象</th><th>日期</th><th>转化事件</th><th>库存</th><th>上限</th><th>已执行</th><th>状态</th><th>失败</th></tr></thead><tbody>${tasks.map(t=>`<tr><td>${t.id}</td><td>${t.platform}</td><td>${t.object}</td><td>${t.date}</td><td>${t.event}</td><td>${t.stock}</td><td>${t.limit}</td><td>${t.done}</td><td><span class="tag ${t.status==='已完成'?'green':t.status==='部分失败'?'orange':'blue'}">${t.status}</span></td><td>${t.fail}</td></tr>`).join('')}</tbody></table>`}
function calcStock(){openModal('库存核算结果',`<div class="cards" style="grid-template-columns:repeat(3,1fr)"><div class="card metric"><div class="micon">开</div><div><div>有效开口</div><b>3,418</b><small>优先使用</small></div></div><div class="card metric"><div class="micon">粉</div><div><div>加企微好友</div><b>2,105</b><small>排除已回传 820</small></div></div><div class="card metric"><div class="micon">互</div><div><div>落地页互动</div><b>3,213</b><small>排除锁定 412</small></div></div></div><p class="sub">库存已排除已成功回传、已被任务锁定、重复目标类型和不满足筛选条件的事件。</p>`)}
function openReplenish(id){let o=runtime.find(x=>x.id===id);openModal('创建补量任务',`<div class="form"><div class="field"><label>补量对象</label><select class="select">${runtime.map(x=>`<option ${o?.id===x.id?'selected':''}>${x.object}</option>`).join('')}</select></div><div class="field"><label>日期范围</label><input class="input" value="2026-07-01"></div><div class="field"><label>转化事件</label><select class="select">${businessEvents.support.map(e=>`<option>${e}</option>`).join('')}</select></div><div class="field"><label>补量数量</label><input class="input" type="number" value="100"></div><div class="field"><label>执行方式</label><select class="select"><option>平滑执行</option><option>立即执行</option></select></div><div class="field" style="grid-column:span 3"><label>排除访问应用</label><select class="select multi" multiple>${appOptions.map((a,i)=>`<option ${i<3?'selected':''}>${a}</option>`).join('')}</select><p class="sub">补量库存核算和执行时，命中已选 AppName 的访问不进入补量。</p></div></div><p class="sub">创建前系统会核算库存，补量数量不能超过可补量库存。</p>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="tasks.unshift({id:'BL-'+Math.floor(3000+Math.random()*1000),platform:'巨量',object:'${o?.object||'新对象'}',date:'2026-07-01',event:'有效开口',stock:3418,limit:100,done:0,status:'执行中',fail:0});toast('补量任务已创建');closeModal();renderTasks()">确认执行</button>`)}
function showReplenishRules(){openModal('补量规则说明',`<div class="list"><div class="itemline"><span>库存去重</span><span class="tag green">排除已补量 / 已锁定</span></div><div class="itemline"><span>默认优先级</span><span class="tag blue">有效开口 → 加粉 → 落地页互动</span></div><div class="itemline"><span>排除访问应用</span><span class="tag orange">命中 AppName 不进入库存</span></div><div class="itemline"><span>数量控制</span><span class="tag orange">不能超过库存和上限</span></div></div>`)}
function renderConfig(){
  $('configTabs').innerHTML=[['events','业务事件'],['conversions','平台转化类型'],['conditions','条件库']].map(t=>`<button class="btn ${configTab===t[0]?'primary':''}" onclick="configTab='${t[0]}';renderConfig()">${t[1]}</button>`).join('');
  if(configTab==='events'){$('configContent').innerHTML=`<div class="card panel"><div class="toolbar between"><div><h2>业务事件</h2><p class="sub">仅展示本期可配置为转化事件的业务事件；不支持项不进入运营配置页。</p></div><span class="tag blue">${businessEvents.support.length} 项</span></div><div class="list" style="margin-top:12px">${businessEvents.support.map(e=>`<div class="itemline"><span>${e}</span><span class="tag green">可配置</span></div>`).join('')}</div></div>`;return}
  if(configTab==='conversions'){let rows=conversions[currentPlatform].filter(x=>!convSearchTerm||x.join('').includes(convSearchTerm));$('configContent').innerHTML=`<div class="card panel"><div class="toolbar between"><div class="tabs">${Object.keys(conversions).map(p=>`<button class="btn ${p===currentPlatform?'primary':''}" onclick="currentPlatform='${p}';renderConfig()">${p}</button>`).join('')}</div><input class="input" value="${convSearchTerm}" oninput="convSearchTerm=this.value;renderConfig()" placeholder="搜索转化类型 / code" style="width:220px"></div><div class="list" style="margin-top:12px">${rows.map(x=>`<div class="itemline"><label class="toolbar"><input type="checkbox" ${common[currentPlatform].includes(x[0])?'checked':''} onchange="toggleCommon('${currentPlatform}','${x[0]}')"><span><b>${x[1]}</b><div class="sub">${x[0]} · ${x[2]}</div></span></label><div class="row-actions"><button class="btn" onclick="moveCommon('${currentPlatform}','${x[0]}',-1)">上移</button><button class="btn" onclick="moveCommon('${currentPlatform}','${x[0]}',1)">下移</button></div></div>`).join('')}</div></div>`;return}
  $('configContent').innerHTML=`<div class="config-grid"><div class="card panel"><h2>投放指标</h2><div class="list">${metricLib.map(x=>`<div class="itemline"><span>${x}</span><span class="tag gray">固定</span></div>`).join('')}</div></div><div class="card panel"><h2>用户条件 / 来源设备</h2><div class="list">${userLib.concat(sourceLib).map(x=>`<div class="itemline"><span>${x}</span><span class="tag gray">条件字段</span></div>`).join('')}</div></div></div>`;
}
function renderConversions(){renderConfig()}
function toggleCommon(p,code){common[p]=common[p]||[];common[p]=common[p].includes(code)?common[p].filter(x=>x!==code):[...common[p],code];renderConfig();toast('常用项已更新，策略配置下拉同步变化')}
function moveCommon(p,code,dir){let arr=common[p],i=arr.indexOf(code),j=i+dir;if(i<0||j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]];renderConversions()}
function openModal(title,body,foot){$('modalTitle').textContent=title;$('modalBody').innerHTML=body;$('modalFoot').innerHTML=foot||'<button class="btn primary" onclick="closeModal()">知道了</button>';$('modalMask').classList.add('show');$('modal').classList.add('show')}
function closeModal(){$('modalMask').classList.remove('show');$('modal').classList.remove('show')}
function toast(msg){$('toast').textContent=msg;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)}
init();
</script>
</body>
</html>
