function setHomeAccounts(id){toggleArray(state.home.accounts,platformAccounts(state.home.platform),id)} function setAdsAccounts(id){toggleArray(state.ads.accounts,platformAccounts(state.ads.platform),id)} function setAdsFilter(id){toggleArray(state.ads.ads,availableAds(state.ads),id)} function setLandingAccounts(id){toggleArray(state.landing.accounts,platformAccounts(state.landing.platform),id)} function setLandingAds(id){toggleArray(state.landing.ads,availableAds(state.landing),id)}
function availableAds(scope){const all=scope.accounts.length?scope.accounts:platformAccounts(scope.platform).map(x=>x.id);const drilled=scope===state.ads&&scope.level==='ad'&&scope.path[0]? [scope.path[0].id] : all;return ADS.filter(x=>drilled.includes(x.account))}
function basicFilters(scope,name,withAds=false,withRange=true){const accounts=platformAccounts(scope.platform), ads=availableAds(scope);return '<div class="filters card"><div class="field"><label>平台</label><select class="select" onchange="'+name+'.platform=this.value;'+name+'.accounts=[];'+name+'.ads=[];render()"><option '+(scope.platform==='巨量'?'selected':'')+'>巨量</option><option '+(scope.platform==='腾讯'?'selected':'')+'>腾讯</option></select></div>'+picker(name+'acc','广告账户',accounts,scope.accounts,'set'+(name==='state.home'?'HomeAccounts':name==='state.ads'?'AdsAccounts':'LandingAccounts'),'未选择（当前平台全部账户）')+(withAds?picker(name+'ad','广告',ads,scope.ads,'set'+(name==='state.ads'?'AdsFilter':'LandingAds'),'未选择（当前范围全部广告）'):'')+(withRange?'<div class="field"><label>时间范围</label><select class="select" onchange="'+name+'.range=this.value;render()">'+['今天','近 7 天','近 14 天','近 30 天','自定义日期'].map(x=>'<option '+(scope.range===x?'selected':'')+'>'+x+'</option>').join('')+'</select></div>':'')+'</div>'}
function homeScopeFactor(scope){const platform=scope.platform==='腾讯'?.76:1;const accounts=scope.accounts.length===0?1:scope.accounts.length===1?.52:.88;return platform*accounts} function metricValue(metric,i=0,factor=1){const n=12000+i*1370;if(metric==='消耗')return '¥'+Math.round((86420-i*4800)*factor).toLocaleString();if(metric.includes('成本'))return '¥'+Math.round((i?36:129)*(1+(1-factor)*.12));if(metric.includes('率'))return ((i?18.6:34.6)*(1+(1-factor)*.08)).toFixed(1)+'%';return Math.round((n-i*240)*factor).toLocaleString()}
function metricUnit(metric){return metric==='消耗'||metric.includes('成本')?'元':metric.includes('率')?'%':'次数'}
function chartSeed(metric,index,count){const base=[58,75,63,70,52,61,48,56,66,51,60,55,68,57,62,54,59,53,56,50,52,49,51,50,52,48,47,49,48,50];const factor=metricUnit(metric)==='元'?18:metricUnit(metric)==='%' ? .35 : 1;return Array.from({length:count},(_,i)=>Math.max(1,Math.round((base[(i*3+index*5)%base.length]+index*7+i%3*3)*factor)))}
function smoothPath(points){if(points.length===1)return 'M '+points[0][0]+' '+points[0][1];let d='M '+points[0][0]+' '+points[0][1];for(let i=1;i<points.length;i++){const p=points[i-1],q=points[i],mx=((p[0]+q[0])/2).toFixed(2);d+=' C '+mx+' '+p[1]+' '+mx+' '+q[1]+' '+q[0]+' '+q[1]}return d}
function formatTick(v,unit){if(unit==='元')return '¥'+Math.round(v).toLocaleString();if(unit==='%')return Math.round(v)+'%';return Math.round(v).toLocaleString()}
function trendChart(metrics,{hour=false,strategy=false,factor=1,fullHours=false}={}){const labels=hour?(fullHours?FULL_HOUR_LABELS:HOUR_LABELS):DAY_LABELS,colors=['#165dff','#ff6a4a','#18a874','#9b6bff'];const series=metrics.map((m,i)=>({name:m,unit:strategy?'次数':metricUnit(m),color:colors[i],values:chartSeed(m,i,labels.length).map(v=>Math.max(1,Math.round(v*factor)))}));const split=!strategy&&series.length===2;const left=series.filter((_,i)=>!split||i===0),right=split?[series[1]]:[];const scale=group=>{const max=Math.max(...group.flatMap(s=>s.values),1),top=Math.ceil(max/5)*5;return {top,values:[top,top*.75,top*.5,top*.25,0]}};const ls=scale(left),rs=right.length?scale(right):null;const draw=series.map((s,i)=>{const sc=split&&i===1?rs:ls,points=s.values.map((v,j)=>[7+j*(86/(labels.length-1)),86-v/sc.top*66]);return '<path class="line" d="'+smoothPath(points)+'" stroke="'+s.color+'"/>'}).join('');const grid=[20,36.5,53,69.5,86].map(y=>'<line class="grid" x1="7" y1="'+y+'" x2="93" y2="'+y+'"/>').join('');return '<div class="report-legend">'+series.map(s=>'<span><i style="background:'+s.color+'"></i>'+s.name+(split?'（'+(s===series[0]?'左轴':'右轴')+'）':'')+'</span>').join('')+'</div><div class="chart report-chart"><span class="axis-title left">'+(strategy?'数量':left[0].name+'（'+left[0].unit+'）')+'</span>'+(right.length?'<span class="axis-title right">'+right[0].name+'（'+right[0].unit+'）</span>':'')+'<div class="axis-l">'+ls.values.map(v=>'<span>'+formatTick(v,left[0].unit)+'</span>').join('')+'</div>'+(right.length?'<div class="axis-r">'+rs.values.map(v=>'<span>'+formatTick(v,right[0].unit)+'</span>').join('')+'</div>':'')+'<svg viewBox="0 0 100 100" preserveAspectRatio="none">'+grid+draw+'</svg></div><div class="axis-x report-axis-x '+(labels.length>15?'dense':'')+'">'+labels.map(x=>'<span>'+x+(hour?' 时':'')+'</span>').join('')+'</div>'}
function limitMetric(scope,metric){const list=scope.metrics;const i=list.indexOf(metric);if(i>=0)list.splice(i,1);else if(list.length<2)list.push(metric);else return toast('最多同时选择 2 个指标');savePrefs();render()}
function home(){const s=state.home,factor=homeScopeFactor(s),isToday=s.range==='今天',rangeOptions=['今天','近 3 天','近 7 天','近 30 天','自定义日期'];const rangeControl='<div class="trend-filter"><div class="field"><label>时间范围</label><select class="select" onchange="state.home.range=this.value;render()">'+rangeOptions.map(x=>'<option '+(s.range===x?'selected':'')+'>'+x+'</option>').join('')+'</select></div>'+(s.range==='自定义日期'?'<div class="custom-range"><input class="input" type="date" value="'+s.customStart+'" onchange="state.home.customStart=this.value;render()"><span>至</span><input class="input" type="date" value="'+s.customEnd+'" onchange="state.home.customEnd=this.value;render()"></div>':'')+'</div>';return basicFilters(s,'state.home',false,false)+'<div class="section"><div class="head"><h2>今日关键指标</h2><button class="btn" onclick="toggleCardMenu()">管理指标</button></div>'+cardMenuHtml()+'<div class="metric-grid">'+s.cards.map((m,i)=>'<div class="card metric"><span>今日'+m+'</span><b>'+metricValue(m,i,factor)+'</b><small>较昨日同一截止时刻 '+(m.includes('成本')?'↓ 4.1%':'↑ 8.3%')+'</small>'+(s.cards.length>1?'<button class="x" onclick="removeCard(\''+m+'\')">×</button>':'')+'</div>').join('')+'</div></div><div class="home-grid section"><div class="card trend"><div class="head trend-head"><div><h2>近期趋势</h2><p class="muted">'+(isToday?'今天按小时展示':'按日展示')+' · 最多比较 2 个指标，左右 Y 轴独立缩放</p></div>'+rangeControl+'</div><div class="chips">'+AD_METRICS.filter(x=>['消耗','转化成本','加粉成本','开口成本','曝光','点击','加粉次数','开口次数'].includes(x)).map(m=>'<button class="chip '+(s.metrics.includes(m)?'active':'')+'" onclick="limitMetric(state.home,\''+m+'\')">'+m+'</button>').join('')+'</div>'+trendChart(s.metrics,{hour:isToday,factor})+'</div><div class="card alert-panel"><div class="head" style="padding:16px 16px 0"><div><h2>最新报警摘要</h2></div><button class="btn" onclick="openNotifications()">查看全部</button></div>'+state.alerts.filter(a=>a.unread).map(alertRow).join('')+'</div></div>'}
function cardMenuHtml(){const all=AD_METRICS;return state.menu==='cards'?'<div class="card" style="padding:12px;margin-bottom:10px"><div class="chips">'+all.map(m=>'<label class="chip"><input type="checkbox" '+(state.home.cards.includes(m)?'checked':'')+' onchange="toggleCard(\''+m+'\')">'+m+'</label>').join('')+'</div></div>':''} function toggleCardMenu(){state.menu=state.menu==='cards'?'':'cards';render()} function toggleCard(m){const a=state.home.cards,i=a.indexOf(m);if(i>=0){if(a.length===1)return toast('至少保留一张指标卡');a.splice(i,1)}else a.push(m);savePrefs();render()} function removeCard(m){toggleCard(m)}

function availableCreatives(s){const drilled=s===state.ads&&s.level==='creative'&&s.path.length>1?[s.path[1].id]:null;const ads=drilled||s.ads.length?s.ads.length?s.ads:(drilled||availableAds(s).map(x=>x.id)):availableAds(s).map(x=>x.id);return CRE.filter(x=>ads.includes(x.ad))} function availablePackages(s){const ads=s.ads.length?s.ads:availableAds(s).map(x=>x.id);return PACK.filter(x=>ads.includes(x.ad))} function columnsForLevel(level){return level==='package'?state.ads.packageColumns:state.ads.columns} function objectRow(r,i,level){const canDrill=level==='account'||level==='ad';return '<tr '+(canDrill?'data-click onclick="drill(\''+r.id+'\')"':'')+'><td><b>'+r.name+'</b></td><td>'+r.id+'</td>'+columnsForLevel(level).map(m=>'<td>'+metricValue(m,i)+'</td>').join('')+'<td>'+(canDrill?'<button class="btn link" onclick="event.stopPropagation();drill(\''+r.id+'\')">下钻</button> ':'')+'<button class="btn link" onclick="event.stopPropagation();openTrend(\''+r.name+'\',\''+(level==='package'?'APP包名':'广告对象')+'\')">查看趋势</button>'+(level==='creative'?' <button class="btn link" onclick="event.stopPropagation();openCreative(\''+r.id+'\')">查看详情</button>':'')+'</td></tr>'} function setLevel(level){state.ads.level=level;state.ads.path=[];render()} function drill(id){if(state.ads.level==='account'){state.ads.path=[ACC.find(x=>x.id===id)];state.ads.level='ad'}else if(state.ads.level==='ad'){state.ads.path.push(ADS.find(x=>x.id===id));state.ads.level='creative'}render()} function toggleColumns(){state.menu=state.menu==='columns'?'':'columns';render()} function columnsMenu(){if(state.menu!=='columns')return '';const isPackage=state.ads.level==='package',metrics=isPackage?PACK_METRICS:AD_METRICS,selected=isPackage?state.ads.packageColumns:state.ads.columns;return '<div class="card" style="padding:12px;margin-bottom:10px"><div class="head"><b>列表列管理</b><span class="muted">个人配置</span></div><div class="chips">'+metrics.map(m=>'<label class="chip"><input type="checkbox" '+(selected.include function monitorMetrics(type){if(type==='落地页')return LP_METRICS;if(type==='策略组')return STATUS;return AD_METRICS} function objectRows(type,e){const acc=platformAccounts(e.platform);const accIds=e.accountIds.length?e.accountIds:acc.map(x=>x.id);if(type==='广告账户')return acc;if(type==='广告')return ADS.filter(x=>accIds.includes(x.account));if(type==='创意素材'){const ads=e.adIds.length?e.adIds:ADS.filter(x=>accIds.includes(x.account)).map(x=>x.id);return CRE.filter(x=>ads.includes(x.ad))}if(type==='落地页')return LP;return [{id:'s1',name:'巨量冷启到有效开口策略'},{id:'s2',name:'暑期体验课转化策略'}]}

function saveRule(){const e=state.monitor.editor;if(!e.objects.length)return toast('请至少选择一个监控对象');if(e.conditions.some(c=>!c.value))return toast('请完整填写指标条件');if(e.window&&(!/^\d+$/.test(e.window)||+e.window<1||+e.window>24))return toast('近 X 小时请输入 1–24 的整数');const sig=[e.type,[...e.objects].sort().join(','),e.conditions.map(c=>c.metric+c.op+c.value).sort().join(','),e.window,e.freq,e.period].join('|');if(state.rules.some(r=>r.id!==e.id&&[r.type,[...r.objects].sort().join(','),r.conditions.map(c=>c.metric+c.op+c.value).sort().join(','),r.window,r.freq,r.period].join('|')===sig))return toast('存在完全相同的监控任务');e.name=e.name||e.type+'-'+e.conditions[0].metric+'-'+TODAY;if(e.id)state.rules=state.rules.map(r=>r.id===e.id?e:r);else{e.id='r'+Date.now();state.rules.unshift(e)}closeDrawer();render();toast('监控任务已保存')}

function renderOverlay(){const o=$('overlay'),d=state.drawer;if(!d){o.innerHTML='';return}if(d==='rule'){o.innerHTML='<div class="drawer-mask"></div><aside class="drawer">'+ruleEditor()+'</aside>';return}if(d==='notifications'){o.innerHTML='<div class="drawer-mask" onclick="closeDrawer()"></div><aside class="drawer"><div class="drawer-head"><div><h2>监控报警</h2><p>未读优先，点击查看后标记为已读。</p></div><button class="icon" onclick="closeDrawer()">×</button></div><div class="drawer-body">'+state.alerts.map(a=>'<div class="card" style="padding:14px;margin-bottom:10px"><span class="tag '+(a.unread?'warn':'gray')+'">'+(a.unread?'未读':'已读')+'</span><h3 style="margin:8px 0 3px">'+a.object+'</h3><p class="muted">'+a.metric+' · '+a.reason+' · '+a.time+'</p><button class="btn" onclick="openRecord(\''+a.id+'\')">查看详情</button></div>').join('')+'</div></aside>';return}if(d.startsWith('record:')){const a=state.alerts.find(x=>x.id===d.slice(7));o.innerHTML='<div class="drawer-mask" onclick="closeDrawer()"></div><aside class="drawer"><div class="drawer-head"><div><h2>报警记录详情</h2><p>已读不代表异常恢复。</p></div><button class="icon" onclick="closeDrawer()">×</button></div><div class="drawer-body"><div class="detail-grid"><div class="card metric"><span>监控对象</span><b>'+a.object+'</b></div><div class="card metric"><span>命中指标</span><b>'+a.metric+'</b></div><div class="card metric"><span>触发时间</span><b>'+a.time+'</b></div><div class="card metric"><span>通知状态</span><b>已读</b></div></div><div class="notice section">命中条件：'+a.reason+'。本页不提供小时趋势入口。</div></div></aside>';return}if(d.startsWith('landing:')){const r=LP.find(x=>x.id===d.slice(8)),m=state.landing.metrics;o.innerHTML='<div class="drawer-mask" onclick="closeDrawer()"></div><aside class="drawer"><div class="drawer-head"><div><h2>'+r.name+' · 落地页详情</h2><p>筛选范围：'+state.landing.platform+' · '+(state.landing.accounts.length?names(state.landing.accounts,ACC):'全部账户')+' · '+state.landing.range+'</p></div><div class="drawer-actions"><button class="btn primary" onclick="op   return state.strategy.bindingMode==='amount'?markup.replace('<div class="table-wrap">','<p class="muted" style="margin:0 0 8px;font-size:12px">排序说明：点击转化事件列表头，按该事件的“实际产生”数切换升序 / 降序；所处状态不参与排序。</p><div class="table-wrap">'):markup;
};
function isValidThreshold(value){return /^(?:0|[1-9]\d*)(?:\.\d{1,3})?$/.test(String(value))}
ruleEditor=function(){
  const e=state.monitor.editor,needsCascade=['广告','创意素材'].includes(e.type);
  const terminalLabel={广告账户:'广告账户',广告:'广告',创意素材:'创意素材',落地页:'落地页',策略组:'策略组'}[e.type];
  const conditionRows=e.conditions.map((condition,index)=>{
    const percent=metricUnit(condition.metric)==='%';
    return '<div class="rule-condition-row"><div class="field"><label>指标</label><select class="select" onchange="updateCondition('+index+',\'metric\',this.value)">'+monitorMetrics(e.type).map(metric=>'<option '+(condition.metric===metric?'selected':'')+'>'+metric+'</option>').join('')+'</select></div><div class="field"><label>比较方式</label><select class="select" onchange="updateCondition('+index+',\'op\',this.value)">'+RULE_OPERATORS.map(operator=>'<option '+(condition.op===operator?'selected':'')+'>'+operator+'</option>').join('')+'</select></div><div class="field"><label>阈值</label><div style="display:flex;align-items:center;gap:6px"><input class="input" type="number" min="0" step="0.001" value="'+condition.value+'" oninput="updateCondition('+index+',\'value\',this.value)" placeholder="请输入阈值">'+(percent?'<span class="muted" style="min-width:12px">%</span>':'')+'</div></div><button class="btn rule-remove" '+(e.conditions.length===1?'disabled':'')+' onclick="removeCondition('+index+')">×</button></div>';
  }).join('');
  const cascade=needsCascade?ruleCascadePicker('accountIds','广告账户范围',ruleScopeAccounts(e))+ruleCascadePicker('adIds','广告范围',ruleScopeAds(e)):'';
  return '<div class="drawer-head"><div><h2>'+(e.id?'编辑':'新建')+'监控任务</h2><p>任务仅自己可见、编辑和接收提醒。</p></div><button class="icon" onclick="closeDrawer()">×</button></div><div class="drawer-body"><div class="field"><label>监控名称（选填）</label><input class="input" value="'+e.name+'" oninput="state.monitor.editor.name=this.value" placeholder="留空时自动生成"><p class="muted">自动命名：'+autoRuleName(e)+'</p></div><div class="rule-basic-grid"><div class="field"><label>监控对象类型</label><select class="select" onchange="changeRuleType(this.value)">'+['广告账户','广告','创意素材','落地页','策略组'].map(type=>'<option '+(e.type===type?'selected':'')+'>'+type+'</option>').join('')+'</select></div><div class="field"><label>平台</label><select class="select" onchange="state.monitor.editor.platform=this.value;state.monitor.editor.accountIds=[];state.monitor.editor.adIds=[];state.monitor.editor.objects=[];renderOverlay()"><option '+(e.platform==='巨量'?'selected':'')+'>巨量</option><option '+(e.platform==='腾讯'?'selected':'')+'>腾讯</option></select></div></div><div class="section rule-cascade">'+cascade+ruleCascadePicker('objects',terminalLabel+'（最终监控对象）',ruleTerminalRows(e),true)+'</div><div class="section rule-condition-card"><div class="head"><h3>指标条件</h3><button class="btn" onclick="addCondition()">+ 添加条件</button></div><div class="rule-condition-list">'+conditionRows+'</div><p class="muted">任一对象命中任一条件即触发报警。</p></div><div class="section rule-schedule-grid"><div class="field"><label>近 X 小时（选填）</label><input class="input" value="'+e.window+'" oninput="state.monitor.editor.window=this.value" placeholder="留空为当日累计"><p class="muted">填写时统计最近 N 个已完成自然小时；留空时统计当日累计。</p></div><div><div class="field"><label>检测频率</label><select class="select" onchange="state.monitor.editor.freq=this.value">'+['5 分钟','15 分钟','30 分钟','1 小时'].map(freq=>'<option '+(e.freq===freq?'selected':'')+'>'+freq+'</option>').join('')+'</select></div><div class="field" style="margin-top:10px"><label>生效时段</label><input class="input" value="'+e.period+'" oninput="state.monitor.editor.period=this.value"></div></div></div><div class="drawer-actions" style="justify-content:flex-end;margin-top:18px"><button class="btn" onclick="closeDrawer()">取消</button><button class="btn primary" onclick="saveRule()">保存任务</button></div></div>';
};
saveRule=function(){
  const e=state.monitor.editor;
  if(!e.objects.length)return toast('请至少选择一个监控对象');
  if(e.conditions.some(condition=>!isValidThreshold(condition.value)))return toast('阈值请输入大于等于 0 的数字，最多保留 3 位小数');
  if(e.window&&(!/^\d+$/.test(e.window)||+e.window<1||+e.window>24))return toast('近 X 小时请输入 1–24 的整数');
  const signature=[e.type,[...e.objects].sort().join(','),e.conditions.map(condition=>condition.metric+condition.op+condition.value).sort().join(','),e.window,e.freq,e.period].join('|');
  if(state.rules.some(rule=>rule.id!==e.id&&[rule.type,[...rule.objects].sort().join(','),rule.conditions.map(condition=>condition.metric+condition.op+condition.value).sort().join(','),rule.window,rule.freq,rule.period].join('|')===signature))return toast('存在完全相同的监控任务');
  e.name=e.name||autoRuleName(e);
  if(e.id)state.rules=state.rules.map(rule=>rule.id===e.id?e:rule);else{e.id='r'+Date.now();state.rules.unshift(e)}
  closeDrawer();render();toast('监控任务已保存');
};
/* 创意详情沿用广告对象分析的日 / 小时模式，避免同屏出现两套趋势。 */
const renderOverlayWithCreativeMode=renderOverlay;
renderOverlay=function(){
  const d=state.drawer;
  if(!d?.startsWith('creative:')){
    renderOverlayWithCreativeMode();
    return;
  }
  const creative=CRE.find(row=>row.id===d.slice(9));
  if(!creative){closeDrawer();return}
  const isDayMode=state.ads.mode==='day';
  const dateRange=state.ads.range==='自定义日期'?(state.ads.customDate||TODAY):state.ads.range;
  const trend=isDayMode
    ?'<div class="section card trend"><div class="head"><div><h3>链路指标 · 按日趋势</h3><p class="muted">数据范围：'+dateRange+'</p></div></div>'+trendChart(['消耗','点击'])+'</div>'
    :'<div class="section">'+hourTrendPanel('creative',AD_METRICS,['消耗','点击'])+'</div>';
  $('overlay').innerHTML='<div class="drawer-mask" onclick="closeDrawer()"></div><aside class="drawer"><div class="drawer-head"><div><h2>'+creative.name+' · 创意详情</h2></div><div class="drawer-actions"><button class="btn primary" onclick="openRule(\'\',{type:\'创意素材\',objects:[\''+creative.id+'\']})">新建监控</button><button class="icon" onclick="closeDrawer()">×</button></div></div><div class="drawer-body">'+trend+'</div></aside>';
};
/* 监控任务：停用即停止后续检测；删除仅移除任务，报警事实永久保留。 */
function deleteRule(id){
  const rule=state.rules.find(item=>item.id===id);
  if(!rule)return;
  if(!window.confirm('删除“'+rule.name+'”后将停止后续检测；已产生的报警记录会永久保留。是否删除？'))return;
  state.rules=state.rules.filter(item=>item.id!==id);
  render();
  toast('监控任务已删除，历史报警记录已保留');
}
taskList=function(){
  return '<div class="notice" style="margin-bottom:12px">同一规则、对象和指标条件当天最多提醒一次；检测频率仅决定检测间隔。</div><div class="table-wrap"><table class="table"><thead><tr><th>监控任务</th><th>对象类型</th><th>监控对象</th><th>指标条件</th><th>统计范围</th><th>检测频率</th><th>生效时段</th><th>状态</th><th>操作</th></tr></thead><tbody>'+state.rules.map(rule=>'<tr><td><b>'+rule.name+'</b></td><td>'+rule.type+'</td><td>'+ruleNames(rule).join('、')+'</td><td>'+rule.conditions.map(condition=>condition.metric+condition.op+condition.value).join('；')+'</td><td>'+(rule.window?'近 '+rule.window+' 小时':'当日累计')+'</td><td>'+rule.freq+'</td><td>'+rule.period+'</td><td><label><input type="checkbox" '+(rule.enabled?'checked':'')+' onchange="toggleRule(\''+rule.id+'\')"> '+(rule.enabled?'启用':'停用')+'</label></td><td style="white-space:nowrap"><button class="btn" onclick="openRule(\''+rule.id+'\')">编辑</button><button class="btn" style="margin-left:8px;color:#d03030" onclick="deleteRule(\''+rule.id+'\')">删除</button></td></tr>').join('')+'</tbody></table></div>';
};
recordList=function(){
  return '<div class="notice">报警记录永久保留触发事实与当前用户通知状态；不提供小时趋势入口。</div><div class="table-wrap" style="margin-top:12px"><table class="table"><thead><tr><th>触发时间 / 报警 ID</th><th>通知状态</th><th>监控对象</th><th>命中指标</th><th>命中条件</th><th>统计范围</th><th>操作</th></tr></thead><tbody>'+state.alerts.map(alert=>'<tr><td>'+alert.time+'<br><small>'+alert.id+'</small></td><td><span class="tag '+(alert.unread?'warn':'gray')+'">'+(alert.unread?'未读':'已读')+'</span></td><td><b>'+alert.object+'</b></td><td>'+alert.metric+'</td><td>'+alert.reason+'</td><td>'+(/近/.test(alert.reason)?alert.reason.match(/（(.+)）/)?.[1]:'当日累计')+'</td><td><button class="btn" onclick="openRecord(\''+alert.id+'\')">查看详情</button></td></tr>').join('')+'</tbody></table></div>';
};
render();
</script></body></html>
